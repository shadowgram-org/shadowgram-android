name: Build APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;35.0.0" \
            "build-tools;30.0.3" \
            "platforms;android-35" \
            "platform-tools" \
            "ndk;21.4.7075529" \
            "cmake;3.10.2.4988404"

      - name: Apply dx compatibility workaround
        # build-tools 35 removed dx, but some dependencies still need it
        run: |
          cp "$ANDROID_HOME/build-tools/30.0.3/dx" "$ANDROID_HOME/build-tools/35.0.0/dx"
          cp "$ANDROID_HOME/build-tools/30.0.3/lib/dx.jar" "$ANDROID_HOME/build-tools/35.0.0/lib/dx.jar"

      - name: Cache native build
        uses: actions/cache@v4
        with:
          path: |
            TMessagesProj/.cxx
          key: native-${{ runner.os }}-ndk21.4.7075529-${{ hashFiles('TMessagesProj/jni/**') }}
          restore-keys: |
            native-${{ runner.os }}-ndk21.4.7075529-

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew :TMessagesProj_App:assembleAfatRelease
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/21.4.7075529

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shadowgram-apk
          path: TMessagesProj_App/build/outputs/apk/afat/release/app.apk
